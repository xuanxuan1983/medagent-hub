<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医美行业日报 — MedAgent Hub</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="/daily-brief-styles.css">

  
</head>
<body>

<!-- 顶部导航 -->
<nav class="topbar">
  <a href="/chat.html" class="topbar-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回工作台
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-title">
    📰 医美行业日报
    <span class="topbar-badge">每日更新</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="topbarDate">—</span>
    <button class="btn-download" id="downloadBtn" onclick="downloadPoster()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载海报
    </button>
  </div>
</nav>

<!-- 主内容 -->
<main class="main" id="mainContent">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div>正在加载今日行业动态...</div>
  </div>
</main>

<!-- 朋友圈海报卡片（隐藏，仅截图用） -->
<div id="posterCard"></div>

<!-- 下载遮罩 -->
<div class="download-overlay" id="downloadOverlay">
  <div class="download-overlay-spinner"></div>
  <div>正在生成海报...</div>
</div>



<!-- ── 申请内测邀请码 悬浮按钮 ── -->
<button class="invite-fab" onclick="openInviteModal()">
  <span class="invite-fab-icon">🎟️</span>
  申请内测邀请码
</button>

<!-- ── 申请邀请码 弹窗 ── -->
<div class="invite-overlay" id="inviteOverlay" onclick="handleOverlayClick(event)">
  <div class="invite-modal">
    <button class="invite-modal-close" onclick="closeInviteModal()">✕</button>
    <div class="invite-modal-icon">🎟️</div>
    <div class="invite-modal-title">申请 MedAgent Hub 内测邀请码</div>
    <div class="invite-modal-desc">MedAgent Hub 目前处于内测阶段，填写以下信息后，我们将在 24 小时内与您联系并发放邀请码。</div>

    <div class="invite-form" id="inviteForm">
      <div class="invite-field">
        <label class="invite-label">您的姓名 *</label>
        <input class="invite-input" id="inviteName" type="text" placeholder="请输入您的姓名" maxlength="20" />
      </div>
      <div class="invite-field">
        <label class="invite-label">所在机构 / 公司 *</label>
        <input class="invite-input" id="inviteOrg" type="text" placeholder="例如：某某医美机构 / 个人创业者" maxlength="50" />
      </div>
      <div class="invite-field">
        <label class="invite-label">手机号 *</label>
        <input class="invite-input" id="invitePhone" type="tel" placeholder="方便我们联系您" maxlength="11" />
      </div>
      <div class="invite-field">
        <label class="invite-label">微信号（选填，方便直接发送邀请码）</label>
        <input class="invite-input" id="inviteWechat" type="text" placeholder="例如：wxid_xxxxxx" maxlength="50" />
      </div>
      <div class="invite-field">
        <label class="invite-label">一句话介绍您的需求（选填）</label>
        <input class="invite-input" id="inviteNote" type="text" placeholder="例如：希望用 AI 提升门店私域运营效率" maxlength="100" />
      </div>
      <button class="invite-submit" id="inviteSubmitBtn" onclick="submitInviteRequest()">提交申请</button>
    </div>

    <div class="invite-success" id="inviteSuccess">
      <div class="invite-success-icon">✅</div>
      <div class="invite-success-title">申请已提交！</div>
      <div class="invite-success-desc">感谢您的关注，我们将在 24 小时内通过手机号与您联系，发放内测邀请码。<br><br>期待与您一起探索 AI 赋能医美的无限可能 🚀</div>
    </div>
  </div>
</div>



<script src="/daily-brief-app.js"></script>
</body>
</html>
