<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAgent Hub - 登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #FFF9F5 0%, #FFE8D9 100% ); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(255,107,107,0.15); }
    .logo { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
    h1 { text-align: center; font-size: 1.5rem; color: #1F2937; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #6B7280; font-size: 0.875rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #FFE8D9; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #FF6B6B; }
    button { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #FF6B6B, #FF922B); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.25rem; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #DC2626; font-size: 0.875rem; margin-top: 0.75rem; text-align: center; display: none; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: white; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-card h2 { text-align: center; font-size: 1.3rem; color: #1F2937; margin-bottom: 0.5rem; }
    .modal-subtitle { text-align: center; color: #6B7280; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .role-options { display: flex; flex-direction: column; gap: 0.75rem; }
    .role-option { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border: 2px solid #F3F4F6; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
    .role-option:hover { border-color: #FF6B6B; background: #FFF5F5; }
    .role-option.selected { border-color: #FF6B6B; background: #FFF0EC; }
    .role-icon { font-size: 1.8rem; flex-shrink: 0; }
    .role-info h3 { font-size: 0.95rem; color: #1F2937; margin-bottom: 0.15rem; }
    .role-info p { font-size: 0.8rem; color: #6B7280; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="card" id="loginCard">
    <div class="logo">&#x1F3E5;</div>
    <h1>MedAgent Hub</h1>
    <p class="subtitle">&#x533B;&#x7F8E;&#x884C;&#x4E1A;AI&#x52A9;&#x624B;&#x56E2;&#x961F;</p>
    <label for="code">&#x9080;&#x8BF7;&#x7801;</label>
    <input type="password" id="code" placeholder="&#x8BF7;&#x8F93;&#x5165;&#x9080;&#x8BF7;&#x7801;" autocomplete="off">
    <button id="btn" onclick="login()">&#x8FDB;&#x5165;</button>
    <p class="error" id="err"></p>
  </div>
  <div class="modal-overlay" id="roleModal">
    <div class="modal-card">
      <div class="logo">&#x1F3AF;</div>
      <h2>&#x9009;&#x62E9;&#x60A8;&#x7684;&#x89D2;&#x8272;</h2>
      <p class="modal-subtitle">&#x6211;&#x4EEC;&#x5C06;&#x4E3A;&#x60A8;&#x63A8;&#x8350;&#x6700;&#x9002;&#x5408;&#x7684; AI &#x52A9;&#x624B;</p>
      <div class="role-options">
        <div class="role-option" data-role="upstream" onclick="selectRole(this)">
          <div class="role-icon">&#x1F3ED;</div>
          <div class="role-info">
            <h3>&#x4E0A;&#x6E38;&#x5382;&#x5546;</h3>
            <p>&#x54C1;&#x724C;&#x65B9;&#x3001;&#x751F;&#x4EA7;&#x5546;&#x3001;&#x7ECF;&#x9500;&#x5546;&#x7B49;&#xFF0C;&#x5173;&#x6CE8; GTM &#x6218;&#x7565;&#x3001;&#x4EA7;&#x54C1;&#x63A8;&#x5E7F;&#x3001;&#x9500;&#x552E;&#x7BA1;&#x7406;</p>
          </div>
        </div>
        <div class="role-option" data-role="downstream" onclick="selectRole(this)">
          <div class="role-icon">&#x1F3E5;</div>
          <div class="role-info">
            <h3>&#x4E0B;&#x6E38;&#x673A;&#x6784;</h3>
            <p>&#x533B;&#x7F8E;&#x673A;&#x6784;&#x3001;&#x8BCA;&#x6240;&#x3001;&#x548B;&#x8BE2;&#x5E08;&#x7B49;&#xFF0C;&#x5173;&#x6CE8;&#x5BA2;&#x6237;&#x8F6C;&#x5316;&#x3001;&#x672F;&#x540E;&#x7BA1;&#x7406;&#x3001;&#x7F8E;&#x5B66;&#x8BBE;&#x8BA1;</p>
          </div>
        </div>
        <div class="role-option" data-role="all" onclick="selectRole(this)">
          <div class="role-icon">&#x1F310;</div>
          <div class="role-info">
            <h3>&#x5168;&#x90E8;&#x6D4F;&#x89C8;</h3>
            <p>&#x6211;&#x60F3;&#x770B;&#x770B;&#x6240;&#x6709; AI &#x52A9;&#x624B;&#xFF0C;&#x7A0D;&#x540E;&#x518D;&#x51B3;&#x5B9A;</p>
          </div>
        </div>
      </div>
      <button id="roleBtn" disabled onclick="confirmRole()">&#x8BF7;&#x5148;&#x9009;&#x62E9;&#x89D2;&#x8272;</button>
    </div>
  </div>
  <script>
    var selectedRole = null;
    document.getElementById('code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
    function selectRole(el) {
      document.querySelectorAll('.role-option').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
      selectedRole = el.dataset.role;
      var btn = document.getElementById('roleBtn');
      btn.disabled = false;
      btn.textContent = '\u5F00\u59CB\u4F7F\u7528 \u2192';
    }
    function confirmRole() {
      if (!selectedRole) return;
      localStorage.setItem('medagent_role', selectedRole);
      window.location.href = '/index.html#agents';
    }
    async function login() {
      var code = document.getElementById('code').value.trim();
      var btn = document.getElementById('btn');
      var err = document.getElementById('err');
      if (!code) return;
      btn.disabled = true;
      btn.textContent = '\u9A8C\u8BC1\u4E2D...';
      err.style.display = 'none';
      try {
        var res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: code }) });
        var data = await res.json();
        if (res.ok) {
          if (data.isAdmin) { window.location.href = '/admin.html'; }
          else { document.getElementById('loginCard').style.display = 'none'; document.getElementById('roleModal').classList.add('active'); }
        } else {
          err.textContent = data.error || '\u9080\u8BF7\u7801\u65E0\u6548';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '\u8FDB\u5165';
        }
      } catch(e) {
        err.textContent = '\u8FDE\u63A5\u5931\u8D25\uFF0C\u8BF7\u91CD\u8BD5';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '\u8FDB\u5165';
      }
    }
  </script>
</body>
</html>
