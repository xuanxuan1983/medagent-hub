<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAgent Hub - 登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F3EF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mascot-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      animation: float 3.5s ease-in-out infinite;
    }
    .mascot-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      display: block;
    }

    /* ===== LOGIN CARD ===== */
    .login-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.5s ease-out;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      border: 1px solid #E8E5E0;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      text-align: center;
    }
    .login-card h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #191919;
      margin-bottom: 0.375rem;
      font-family: 'Noto Serif SC', serif;
    }
    .login-card .subtitle {
      font-size: 0.875rem;
      color: #767676;
      margin-bottom: 2rem;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E8E5E0;
    }
    .divider span {
      font-size: 0.75rem;
      color: #AEAAA5;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .field-label {
      display: block;
      font-size: 0.825rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
      text-align: left;
    }
    .field-label .optional {
      font-weight: 400;
      color: #AEAAA5;
      font-size: 0.75rem;
      margin-left: 4px;
    }
    .login-card input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #E8E5E0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      background: white;
      color: #191919;
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 0.875rem;
    }
    .login-card input#phone {
      letter-spacing: 0.05em;
      margin-bottom: 0;
    }
    .login-card input:focus { border-color: #191919; }
    .login-card input::placeholder { color: #AEAAA5; letter-spacing: 0; }
    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: #191919;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-login:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-error {
      color: #DC2626;
      font-size: 0.825rem;
      margin-top: 0.75rem;
      text-align: center;
      display: none;
    }
    .login-footer {
      margin-top: 1.5rem;
      font-size: 0.775rem;
      color: #AEAAA5;
    }
    .login-footer a { color: #767676; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    /* ===== ROLE SELECTION ===== */
    .role-wrap {
      display: none;
      width: 100%;
      max-width: 580px;
      animation: fadeInUp 0.4s ease-out;
    }
    .role-wrap.active { display: block; }
    .role-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .role-header .mascot-container {
      width: 100px;
      height: 100px;
    }
    .role-header .mascot-img {
      width: 100px;
      height: 100px;
    }
    .role-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #191919;
      margin-bottom: 0.375rem;
      font-family: 'Noto Serif SC', serif;
    }
    .role-header p {
      font-size: 0.875rem;
      color: #767676;
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 1.25rem;
    }
    .role-card {
      background: white;
      border: 2px solid #E8E5E0;
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .role-card:hover { border-color: #AEAAA5; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transform: translateY(-2px); }
    .role-card.selected {
      border-color: #191919;
      background: #F8F7F5;
    }
    .role-card-icon {
      font-size: 1.875rem;
      margin-bottom: 0.75rem;
      display: block;
    }
    .role-card-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: #191919;
      line-height: 1.4;
      margin-bottom: 0.25rem;
    }
    .role-card-desc {
      font-size: 0.775rem;
      color: #767676;
      line-height: 1.5;
    }
    .btn-role-confirm {
      width: 100%;
      padding: 0.875rem;
      background: #191919;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-role-confirm:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-role-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="mascot-container">
        <img src="/meiling-wave.png" alt="美灵" class="mascot-img">
      </div>
      <h1>欢迎使用 MedAgent Hub</h1>
      <p class="subtitle">医美行业首个 AI 搭档平台</p>

      <div class="divider"><span>请输入邀请码</span></div>

      <label class="field-label" for="code">邀请码</label>
      <input type="password" id="code" placeholder="••••••••" autocomplete="off">

      <label class="field-label" for="phone">手机号 <span class="optional">（选填，方便专属跟进）</span></label>
      <input type="tel" id="phone" placeholder="请输入您的手机号" autocomplete="tel" maxlength="11">

      <button class="btn-login" id="loginBtn" onclick="doLogin()">进入</button>
      <p class="login-error" id="loginError"></p>

      <p class="login-footer">
        继续即表示您同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a>
      </p>
    </div>
  </div>

  <!-- ROLE SELECTION -->
  <div class="role-wrap" id="roleWrap">
    <div class="role-header">
      <div class="mascot-container">
        <img src="/meiling-main.png" alt="美灵" class="mascot-img">
      </div>
      <h2>你好！我是美灵</h2>
      <p>请告诉我你的职业身份，我为你定制专属工作台</p>
    </div>
    <div class="role-grid">
      <div class="role-card" data-role="downstream-aesthetic" onclick="selectRole(this)">
        <span class="role-card-icon">🧑‍⚕️</span>
        <div class="role-card-title">美学设计 · 学术背书</div>
        <div class="role-card-desc">医生 / 技术总监 / 学术专员</div>
      </div>
      <div class="role-card" data-role="downstream-consultant" onclick="selectRole(this)">
        <span class="role-card-icon">👩‍💼</span>
        <div class="role-card-title">销冠话术 · 高清生图</div>
        <div class="role-card-desc">咨询师 / 销售顾问 / 客服</div>
      </div>
      <div class="role-card" data-role="upstream-marketing" onclick="selectRole(this)">
        <span class="role-card-icon">📈</span>
        <div class="role-card-title">视觉营销 · 经营增效</div>
        <div class="role-card-desc">市场 / 运营 / 品牌专员</div>
      </div>
      <div class="role-card" data-role="all" onclick="selectRole(this)">
        <span class="role-card-icon">🏥</span>
        <div class="role-card-title">培训 · 医学 · 管理</div>
        <div class="role-card-desc">院长 / 培训师 / 大区经理</div>
      </div>
    </div>
    <button class="btn-role-confirm" id="roleConfirmBtn" disabled onclick="confirmRole()">
      请先选择身份
    </button>
  </div>

  <script>
    var selectedRole = null;
    var loginCode = null;

    document.getElementById('code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('phone').focus();
    });
    document.getElementById('phone').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var code = document.getElementById('code').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var btn = document.getElementById('loginBtn');
      var err = document.getElementById('loginError');
      if (!code) return;
      btn.disabled = true;
      btn.textContent = '验证中...';
      err.style.display = 'none';
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, phone: phone || null })
        });
        var data = await res.json();
        if (res.ok) {
          loginCode = code;
          if (data.isAdmin) {
            var params = new URLSearchParams(window.location.search);
            var redirect = params.get('redirect');
            window.location.href = redirect ? decodeURIComponent(redirect) : '/admin.html';
          } else {
            var params = new URLSearchParams(window.location.search);
            var redirect = params.get('redirect');
            if (redirect) {
              window.location.href = decodeURIComponent(redirect);
            } else {
              document.getElementById('loginWrap').style.display = 'none';
              document.getElementById('roleWrap').classList.add('active');
            }
          }
        } else {
          err.textContent = data.error || '邀请码无效，请重试';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '进入';
        }
      } catch(e) {
        err.textContent = '连接失败，请稍后重试';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '进入';
      }
    }

    function selectRole(el) {
      document.querySelectorAll('.role-card').forEach(function(c) { c.classList.remove('selected'); });
      el.classList.add('selected');
      selectedRole = el.dataset.role;
      var btn = document.getElementById('roleConfirmBtn');
      btn.disabled = false;
      btn.textContent = '开始使用 →';
    }

    function confirmRole() {
      if (!selectedRole) return;
      localStorage.setItem('medagent_role', selectedRole);
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      window.location.href = redirect ? decodeURIComponent(redirect) : '/chat.html';
    }
  </script>
</body>
</html>
