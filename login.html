<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAgent Hub - 登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ===== LOGIN CARD ===== */
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 14px;
      background: #191919; color: white;
      font-weight: 900; font-size: 1.4rem;
      margin-bottom: 0.875rem;
    }
    .login-logo h1 {
      font-size: 1.25rem; font-weight: 700; color: #191919;
      margin-bottom: 0.25rem;
    }
    .login-logo p {
      font-size: 0.825rem; color: #767676;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 2.25rem;
      border: 1px solid #E8E5E0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .login-card label {
      display: block; font-size: 0.825rem; font-weight: 600;
      color: #374151; margin-bottom: 0.5rem;
    }
    .login-card input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #E8E5E0; border-radius: 10px;
      font-size: 0.95rem; outline: none; font-family: inherit;
      transition: border-color 0.15s; background: white; color: #191919;
    }
    .login-card input:focus { border-color: #191919; }
    .login-card input::placeholder { color: #AEAAA5; }
    .btn-login {
      width: 100%; padding: 0.875rem;
      background: #191919; color: white;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      margin-top: 1.25rem; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.45; cursor: not-allowed; }
    .login-error {
      color: #DC2626; font-size: 0.825rem;
      margin-top: 0.75rem; text-align: center; display: none;
    }

    /* ===== ROLE SELECTION ===== */
    .role-wrap {
      display: none;
      width: 100%;
      max-width: 600px;
    }
    .role-wrap.active { display: block; }
    .role-header {
      text-align: center; margin-bottom: 2.5rem;
    }
    .role-header .role-logo-icon {
      font-size: 2.5rem; margin-bottom: 1rem; display: block;
    }
    .role-header h2 {
      font-size: 1.5rem; font-weight: 700; color: #191919;
      margin-bottom: 0.375rem;
    }
    .role-header p {
      font-size: 0.875rem; color: #767676;
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .role-card {
      background: white;
      border: 2px solid #E8E5E0;
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .role-card:hover { border-color: #AEAAA5; }
    .role-card.selected {
      border-color: #191919;
      background: #F5F4F2;
    }
    .role-card-icon {
      font-size: 2rem; margin-bottom: 0.875rem; display: block;
    }
    .role-card-title {
      font-size: 0.875rem; font-weight: 600; color: #191919;
      line-height: 1.4;
    }
    .btn-role-confirm {
      width: 100%; padding: 0.875rem;
      background: #191919; color: white;
      border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn-role-confirm:hover { opacity: 0.85; }
    .btn-role-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-logo">
      <div class="login-logo-badge">M</div>
      <h1>MedAgent Hub</h1>
      <p>医美行业 AI 助手平台</p>
    </div>
    <div class="login-card">
      <label for="code">邀请码</label>
      <input type="password" id="code" placeholder="请输入邀请码" autocomplete="off">
      <button class="btn-login" id="loginBtn" onclick="doLogin()">进入</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- ROLE SELECTION -->
  <div class="role-wrap" id="roleWrap">
    <div class="role-header">
      <span class="role-logo-icon">🏥</span>
      <h2>欢迎来到 MedAgent Hub</h2>
      <p>请选择您的职业身份，开启专属智能工作台</p>
    </div>
    <div class="role-grid">
      <div class="role-card" data-role="downstream-aesthetic" onclick="selectRole(this)">
        <span class="role-card-icon">🧑‍⚕️</span>
        <div class="role-card-title">美学设计 | 学术背书</div>
      </div>
      <div class="role-card" data-role="downstream-consultant" onclick="selectRole(this)">
        <span class="role-card-icon">👩‍💼</span>
        <div class="role-card-title">销冠话术 | 高清生图</div>
      </div>
      <div class="role-card" data-role="upstream-marketing" onclick="selectRole(this)">
        <span class="role-card-icon">📈</span>
        <div class="role-card-title">视觉营销 | 经营增效</div>
      </div>
      <div class="role-card" data-role="all" onclick="selectRole(this)">
        <span class="role-card-icon">🏥</span>
        <div class="role-card-title">培训 | 医学 | 市场 | 销售</div>
      </div>
    </div>
    <button class="btn-role-confirm" id="roleConfirmBtn" disabled onclick="confirmRole()">
      请先选择身份
    </button>
  </div>

  <script>
    var selectedRole = null;

    document.getElementById('code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var code = document.getElementById('code').value.trim();
      var btn = document.getElementById('loginBtn');
      var err = document.getElementById('loginError');
      if (!code) return;
      btn.disabled = true;
      btn.textContent = '验证中...';
      err.style.display = 'none';
      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code })
        });
        var data = await res.json();
        if (res.ok) {
          if (data.isAdmin) {
            window.location.href = '/admin.html';
          } else {
            // Check for redirect param
            var params = new URLSearchParams(window.location.search);
            var redirect = params.get('redirect');
            if (redirect) {
              window.location.href = redirect;
            } else {
              document.getElementById('loginWrap').style.display = 'none';
              document.getElementById('roleWrap').classList.add('active');
            }
          }
        } else {
          err.textContent = data.error || '邀请码无效';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '进入';
        }
      } catch(e) {
        err.textContent = '连接失败，请重试';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '进入';
      }
    }

    function selectRole(el) {
      document.querySelectorAll('.role-card').forEach(function(c) { c.classList.remove('selected'); });
      el.classList.add('selected');
      selectedRole = el.dataset.role;
      var btn = document.getElementById('roleConfirmBtn');
      btn.disabled = false;
      btn.textContent = '开始使用 →';
    }

    function confirmRole() {
      if (!selectedRole) return;
      localStorage.setItem('medagent_role', selectedRole);
      // Check if there's a redirect param from a protected page
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect');
      if (redirect) {
        window.location.href = decodeURIComponent(redirect);
      } else {
        window.location.href = '/index.html#agents';
      }
    }
  </script>
</body>
</html>
