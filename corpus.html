<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语料中心 - MedAgent Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAF8F5;
            --bg-card: #FFFFFF;
            --bg-hover: #F2F0ED;
            --border: #E8E5E0;
            --text-primary: #191919;
            --text-secondary: #5C5C5C;
            --text-tertiary: #9B9B9B;
            --accent: #E8715A;
            --green: #2D7A4F;
            --blue: #2563EB;
            --red: #DC2626;
            --orange: #D97706;
            --purple: #7C3AED;
            --pink: #BE185D;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(250,248,245,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-logo {
            width: 26px; height: 26px;
            background: var(--text-primary); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 0.75rem;
        }
        .topbar-breadcrumb { font-size: 0.8125rem; color: var(--text-tertiary); }
        .topbar-breadcrumb a { color: var(--text-secondary); text-decoration: none; }
        .topbar-breadcrumb a:hover { color: var(--text-primary); }
        .topbar-breadcrumb strong { color: var(--text-primary); }
        .topbar-actions { display: flex; gap: 0.5rem; align-items: center; }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 0.4375rem 0.875rem;
            border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.8125rem; font-weight: 500; font-family: inherit;
            transition: all 0.12s; display: inline-flex; align-items: center; gap: 0.375rem;
            text-decoration: none;
        }
        .btn-primary { background: var(--text-primary); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
        .btn-green { background: var(--green); color: white; }
        .btn-green:hover { opacity: 0.85; }
        .btn-sm { padding: 0.3125rem 0.625rem; font-size: 0.75rem; }

        /* Export dropdown */
        .export-dropdown { position: relative; }
        .export-menu {
            display: none; position: absolute; right: 0; top: calc(100% + 6px);
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            min-width: 220px; z-index: 200; overflow: hidden;
        }
        .export-menu.show { display: block; }
        .export-item {
            display: block; width: 100%; padding: 0.75rem 1rem;
            background: none; border: none; cursor: pointer;
            text-align: left; font-family: inherit; font-size: 0.8125rem;
            color: var(--text-primary); transition: background 0.1s;
        }
        .export-item:hover { background: var(--bg-hover); }
        .export-item small { display: block; font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.125rem; }

        /* ===== MAIN ===== */
        .main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .page-header { margin-bottom: 1.5rem; }
        .page-title {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.75rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem;
        }
        .page-subtitle { font-size: 0.875rem; color: var(--text-secondary); }

        /* ===== TABS ===== */
        .tabs {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 0.625rem 1rem; color: var(--text-tertiary);
            cursor: pointer; font-size: 0.875rem; font-weight: 500;
            border-bottom: 2px solid transparent; transition: all 0.12s;
        }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.25rem;
            transition: box-shadow 0.15s;
        }
        .stat-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .stat-label {
            font-size: 0.75rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.375rem;
        }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-sub { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.25rem; }

        /* ===== SECTION ===== */
        .section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; margin-bottom: 1.5rem; overflow: hidden;
        }
        .section-header {
            padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg);
        }
        .section-title { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
        .section-body { padding: 1.25rem; }
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
            margin-bottom: 1rem; padding: 1rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px;
        }
        .filter-select, .filter-input {
            padding: 0.4375rem 0.75rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary);
            font-size: 0.8125rem; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        .filter-select:focus, .filter-input:focus { border-color: var(--text-primary); }
        .filter-input { min-width: 180px; }
        .filter-input::placeholder { color: var(--text-tertiary); }

        /* ===== BAR CHART ===== */
        .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; }
        .bar-label {
            width: 110px; font-size: 0.8rem; color: var(--text-secondary);
            text-align: right; flex-shrink: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .bar-track {
            flex: 1; background: var(--bg); border-radius: 4px;
            height: 22px; overflow: hidden; border: 1px solid var(--border);
        }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .bar-fill.green { background: var(--green); }
        .bar-fill.blue { background: var(--blue); }
        .bar-fill.purple { background: var(--purple); }
        .bar-fill.orange { background: var(--orange); }
        .bar-fill.pink { background: var(--pink); }
        .bar-count {
            width: 36px; font-size: 0.8rem; color: var(--text-tertiary);
            text-align: right; flex-shrink: 0; font-weight: 500;
        }

        /* ===== DATA TABLE ===== */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .data-table th {
            text-align: left; padding: 0.625rem 0.75rem;
            color: var(--text-tertiary); font-weight: 500; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.03em;
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 0.625rem 0.75rem;
            border-bottom: 1px solid var(--bg);
            color: var(--text-secondary); vertical-align: top;
        }
        .data-table tr:hover td { background: var(--bg); }

        /* Tags */
        .tag {
            display: inline-block; padding: 0.125rem 0.5rem;
            border-radius: 100px; font-size: 0.7rem; font-weight: 600;
        }
        .tag-agent { background: rgba(37,99,235,0.08); color: var(--blue); }
        .tag-intent { background: rgba(124,58,237,0.08); color: var(--purple); }
        .tag-keyword { background: rgba(217,119,6,0.08); color: var(--orange); }

        /* Conversation preview */
        .conv-preview {
            max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            cursor: pointer; color: var(--text-primary); font-size: 0.8125rem;
        }
        .conv-preview:hover { color: var(--blue); }
        .conv-expanded { display: none; max-width: 360px; }
        .conv-expanded.show { display: block; }
        .conv-bubble {
            padding: 0.5rem 0.75rem; border-radius: 8px;
            font-size: 0.8rem; margin-bottom: 0.375rem; line-height: 1.5;
        }
        .conv-bubble.user { background: var(--bg); color: var(--text-primary); }
        .conv-bubble.assistant { background: rgba(37,99,235,0.06); color: var(--text-primary); }

        /* Label buttons */
        .label-group { display: flex; gap: 0.25rem; }
        .label-btn {
            padding: 0.25rem 0.375rem; background: none;
            border: 1px solid var(--border); border-radius: 6px;
            cursor: pointer; font-size: 0.8rem; transition: all 0.12s;
        }
        .label-btn:hover { background: var(--bg-hover); }
        .label-btn.active-excellent { background: rgba(45,122,79,0.1); border-color: var(--green); }
        .label-btn.active-good { background: rgba(37,99,235,0.08); border-color: var(--blue); }
        .label-btn.active-poor { background: rgba(217,119,6,0.08); border-color: var(--orange); }
        .label-btn.active-discard { background: rgba(220,38,38,0.08); border-color: var(--red); }

        /* Pagination */
        .pagination {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.875rem 1.25rem; border-top: 1px solid var(--border);
        }
        .page-btn {
            padding: 0.3125rem 0.625rem; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 6px;
            cursor: pointer; font-size: 0.8rem; font-family: inherit;
            color: var(--text-secondary); transition: all 0.12s;
        }
        .page-btn:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary); }
        .page-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 0.8rem; color: var(--text-tertiary); margin-left: 0.5rem; }

        /* Heatmap */
        .heatmap-cell {
            text-align: center; font-size: 0.75rem; font-weight: 500;
            transition: all 0.15s;
        }

        .loading { text-align: center; padding: 3rem; color: var(--text-tertiary); font-size: 0.875rem; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-tertiary); font-size: 0.875rem; }

        @media (max-width: 768px) {
            .main { padding: 1rem; }
            .chart-container { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; }
            .topbar { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">M</div>
            <span class="topbar-breadcrumb">
                <a href="index.html">MedAgent Hub</a> / <a href="admin.html">数据看板</a> / <strong>语料中心</strong>
            </span>
        </div>
        <div class="topbar-actions">
            <a href="/admin.html" class="btn btn-secondary">数据看板</a>
            <div class="export-dropdown">
                <button class="btn btn-primary" onclick="toggleExportMenu()">导出语料 ▾</button>
                <div class="export-menu" id="exportMenu">
                    <button class="export-item" onclick="exportCorpus('jsonl')">
                        JSONL 原始语料
                        <small>完整数据，适合存档和自定义处理</small>
                    </button>
                    <button class="export-item" onclick="exportCorpus('sft')">
                        SFT 微调格式
                        <small>兼容 OpenAI / LLaMA 微调格式</small>
                    </button>
                    <button class="export-item" onclick="exportCorpus('csv')">
                        CSV 表格
                        <small>适合 Excel 查看和数据分析</small>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="page-header">
            <h1 class="page-title">语料中心</h1>
            <p class="page-subtitle">自动采集用户对话数据，标注高质量语料，为医美垂直模型训练积累素材</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="overview" onclick="switchTab('overview')">概览</div>
            <div class="tab" data-tab="corpus" onclick="switchTab('corpus')">语料列表</div>
            <div class="tab" data-tab="needs" onclick="switchTab('needs')">需求分析</div>
        </div>

        <!-- 概览 Tab -->
        <div class="tab-content active" id="tab-overview">
            <div class="stats-grid" id="statsGrid"><div class="loading">加载中...</div></div>
            <div class="chart-container" id="overviewCharts"></div>
        </div>

        <!-- 语料列表 Tab -->
        <div class="tab-content" id="tab-corpus">
            <div class="filter-bar">
                <select class="filter-select" id="filterAgent" onchange="loadCorpus()">
                    <option value="">全部 Agent</option>
                </select>
                <select class="filter-select" id="filterIntent" onchange="loadCorpus()">
                    <option value="">全部意图</option>
                    <option value="产品咨询">产品咨询</option>
                    <option value="术后问题">术后问题</option>
                    <option value="价格咨询">价格咨询</option>
                    <option value="方案设计">方案设计</option>
                    <option value="机构运营">机构运营</option>
                    <option value="培训学习">培训学习</option>
                    <option value="销售策略">销售策略</option>
                    <option value="合规风险">合规风险</option>
                    <option value="美学设计">美学设计</option>
                    <option value="供应链管理">供应链管理</option>
                    <option value="其他">其他</option>
                </select>
                <select class="filter-select" id="filterLabel" onchange="loadCorpus()">
                    <option value="">全部标注</option>
                    <option value="unlabeled">未标注</option>
                    <option value="excellent">优秀</option>
                    <option value="good">良好</option>
                    <option value="poor">较差</option>
                    <option value="discard">废弃</option>
                </select>
                <input class="filter-input" id="filterKeyword" placeholder="搜索关键词..." onkeydown="if(event.key==='Enter')loadCorpus()">
                <button class="btn btn-primary btn-sm" onclick="loadCorpus()">搜索</button>
                <button class="btn btn-secondary btn-sm" onclick="resetFilters()">重置</button>
            </div>
            <div class="section">
                <div id="corpusTable" class="section-body"><div class="loading">加载中...</div></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <!-- 需求分析 Tab -->
        <div class="tab-content" id="tab-needs">
            <div id="needsContent"><div class="loading">加载中...</div></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 30;
        const agentNames = {
            'gtm-strategy': 'GTM战略大师', 'product-expert': '产品材料专家',
            'academic-liaison': '学术推广专家', 'marketing-director': '市场创意总监',
            'sales-director': '销售作战总监', 'operations-director': '运营效能总监',
            'training-director': '培训赋能总监', 'aesthetic-design': '高定美学设计总监',
            'senior-consultant': '金牌医美咨询师', 'sparring-robot': '医美实战陪练机器人',
            'post-op-guardian': '医美术后私域管家', 'trend-setter': '医美爆款种草官',
            'anatomy-architect': '医美解剖决策建筑师', 'materials-mentor': '医美材料学硬核导师',
            'visual-translator': '医美视觉通译官', 'material-architect': '医美材料学架构师',
            'area-manager': '大区经理', 'channel-manager': '商务经理',
            'finance-bp': '财务BP', 'hrbp': '战略HRBP', 'procurement-manager': '采购经理'
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if (tabId === 'overview') loadOverview();
            if (tabId === 'corpus') loadCorpus();
            if (tabId === 'needs') loadNeeds();
        }

        async function loadOverview() {
            try {
                const res = await fetch('/api/admin/corpus/stats');
                if (!res.ok) { document.getElementById('statsGrid').innerHTML = '<div class="loading">无权限</div>'; return; }
                const stats = await res.json();
                renderOverview(stats);
            } catch (e) {
                document.getElementById('statsGrid').innerHTML = '<div class="loading">无法连接服务器</div>';
            }
        }

        function renderOverview(stats) {
            const labeledPct = stats.total > 0 ? Math.round(stats.labeled / stats.total * 100) : 0;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总语料条数</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已标注</div>
                    <div class="stat-value">${stats.labeled}</div>
                    <div class="stat-sub">${labeledPct}% 完成率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">优秀语料</div>
                    <div class="stat-value" style="color:var(--green)">${stats.byLabel?.excellent || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">良好语料</div>
                    <div class="stat-value" style="color:var(--blue)">${stats.byLabel?.good || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">较差语料</div>
                    <div class="stat-value" style="color:var(--orange)">${stats.byLabel?.poor || 0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">废弃</div>
                    <div class="stat-value" style="color:var(--red)">${stats.byLabel?.discard || 0}</div>
                </div>`;

            const agentMax = Math.max(...Object.values(stats.byAgent || {}), 1);
            const intentMax = Math.max(...Object.values(stats.byIntent || {}), 1);
            const agentBars = Object.entries(stats.byAgent || {}).sort((a,b) => b[1]-a[1]).map(([id, count]) => `
                <div class="bar-row">
                    <div class="bar-label" title="${agentNames[id] || id}">${agentNames[id] || id}</div>
                    <div class="bar-track"><div class="bar-fill green" style="width:${(count/agentMax*100).toFixed(1)}%"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`).join('');
            const intentBars = Object.entries(stats.byIntent || {}).sort((a,b) => b[1]-a[1]).map(([intent, count]) => `
                <div class="bar-row">
                    <div class="bar-label" title="${intent}">${intent}</div>
                    <div class="bar-track"><div class="bar-fill purple" style="width:${(count/intentMax*100).toFixed(1)}%"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`).join('');

            document.getElementById('overviewCharts').innerHTML = `
                <div class="section">
                    <div class="section-header"><div class="section-title">Agent 语料分布</div></div>
                    <div class="section-body">
                        <div class="bar-chart">${agentBars || '<div class="empty-state">暂无数据</div>'}</div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header"><div class="section-title">意图分类分布</div></div>
                    <div class="section-body">
                        <div class="bar-chart">${intentBars || '<div class="empty-state">暂无数据</div>'}</div>
                    </div>
                </div>`;

            const agentSelect = document.getElementById('filterAgent');
            agentSelect.querySelectorAll('option:not(:first-child)').forEach(o => o.remove());
            Object.keys(stats.byAgent || {}).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = agentNames[id] || id;
                agentSelect.appendChild(opt);
            });
        }

        async function loadCorpus() {
            const agent = document.getElementById('filterAgent').value;
            const intent = document.getElementById('filterIntent').value;
            const label = document.getElementById('filterLabel').value;
            const keyword = document.getElementById('filterKeyword').value;
            const params = new URLSearchParams({
                page: currentPage, pageSize,
                ...(agent && { agent }),
                ...(intent && { intent }),
                ...(label && { label }),
                ...(keyword && { keyword })
            });
            try {
                const res = await fetch(`/api/admin/corpus?${params}`);
                if (!res.ok) { document.getElementById('corpusTable').innerHTML = '<div class="loading">无权限</div>'; return; }
                const data = await res.json();
                renderCorpus(data);
            } catch (e) {
                document.getElementById('corpusTable').innerHTML = '<div class="loading">无法连接服务器</div>';
            }
        }

        function renderCorpus(data) {
            const { items, total, page, pageSize } = data;
            if (!items.length) {
                document.getElementById('corpusTable').innerHTML = '<div class="empty-state">暂无语料数据。用户与 Agent 对话后，语料将自动采集到这里。</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            const rows = items.map(item => {
                const userMsg = (item.conversation || []).find(c => c.role === 'user');
                const assistMsg = (item.conversation || []).find(c => c.role === 'assistant');
                const intentTags = (item.intents || []).map(i => `<span class="tag tag-intent">${esc(i)}</span>`).join('');
                const kwTags = (item.keywords || []).slice(0, 3).map(k => `<span class="tag tag-keyword">${esc(k)}</span>`).join('');
                return `<tr>
                    <td style="color:var(--text-tertiary);white-space:nowrap;font-size:0.75rem">${(item.ts || '').replace('T',' ').slice(0,16)}</td>
                    <td><span class="tag tag-agent">${esc(agentNames[item.agent_id] || item.agent_id || '-')}</span></td>
                    <td style="font-size:0.75rem">${esc(item.user_name || '-')}</td>
                    <td>
                        <div class="conv-preview" onclick="toggleConv(this)">${esc(userMsg?.content || '')}</div>
                        <div class="conv-expanded">
                            <div class="conv-bubble user">👤 ${esc(userMsg?.content || '')}</div>
                            <div class="conv-bubble assistant">🤖 ${esc((assistMsg?.content || '').substring(0, 500))}${(assistMsg?.content || '').length > 500 ? '...' : ''}</div>
                        </div>
                    </td>
                    <td>${intentTags}</td>
                    <td>${kwTags}</td>
                    <td>
                        <div class="label-group">
                            <button class="label-btn ${item.quality_label==='excellent'?'active-excellent':''}" onclick="labelCorpus('${item.id}','excellent',this)" title="优秀">✅</button>
                            <button class="label-btn ${item.quality_label==='good'?'active-good':''}" onclick="labelCorpus('${item.id}','good',this)" title="良好">👍</button>
                            <button class="label-btn ${item.quality_label==='poor'?'active-poor':''}" onclick="labelCorpus('${item.id}','poor',this)" title="较差">⚠️</button>
                            <button class="label-btn ${item.quality_label==='discard'?'active-discard':''}" onclick="labelCorpus('${item.id}','discard',this)" title="废弃">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('corpusTable').innerHTML = `
                <div style="margin-bottom:0.75rem;font-size:0.8125rem;color:var(--text-tertiary)">共 ${total} 条语料，当前第 ${page} 页</div>
                <div style="overflow-x:auto">
                    <table class="data-table">
                        <thead><tr>
                            <th>时间</th><th>Agent</th><th>用户</th><th>对话内容</th><th>意图</th><th>关键词</th><th>标注</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;

            const totalPages = Math.ceil(total / pageSize);
            let pagHtml = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>上一页</button>`;
            for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
                pagHtml += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
            }
            pagHtml += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页</button>`;
            pagHtml += `<span class="page-info">共 ${totalPages} 页</span>`;
            document.getElementById('pagination').innerHTML = pagHtml;
        }

        function goPage(p) { currentPage = p; loadCorpus(); }

        function resetFilters() {
            document.getElementById('filterAgent').value = '';
            document.getElementById('filterIntent').value = '';
            document.getElementById('filterLabel').value = '';
            document.getElementById('filterKeyword').value = '';
            currentPage = 1;
            loadCorpus();
        }

        function toggleConv(el) {
            const expanded = el.nextElementSibling;
            expanded.classList.toggle('show');
            el.style.display = expanded.classList.contains('show') ? 'none' : '';
        }

        async function labelCorpus(id, label, btn) {
            const group = btn.parentElement;
            const currentActive = group.querySelector(`.active-${label}`);
            const newLabel = currentActive === btn ? null : label;
            try {
                const res = await fetch('/api/admin/corpus/label', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, quality_label: newLabel })
                });
                if (res.ok) {
                    group.querySelectorAll('.label-btn').forEach(b => b.className = 'label-btn');
                    if (newLabel) btn.classList.add(`active-${newLabel}`);
                }
            } catch {}
        }

        async function loadNeeds() {
            try {
                const res = await fetch('/api/admin/needs');
                if (!res.ok) return;
                const data = await res.json();
                renderNeeds(data);
            } catch (e) {
                document.getElementById('needsContent').innerHTML = '<div class="loading">无法加载</div>';
            }
        }

        function renderNeeds(data) {
            const intentEntries = Object.entries(data.byIntent || {}).sort((a,b) => b[1]-a[1]);
            const intentMax = Math.max(...intentEntries.map(e => e[1]), 1);
            const intentBars = intentEntries.map(([intent, count]) => `
                <div class="bar-row">
                    <div class="bar-label">${intent}</div>
                    <div class="bar-track"><div class="bar-fill orange" style="width:${(count/intentMax*100).toFixed(1)}%"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`).join('');

            const topKw = (data.topKeywords || []).slice(0, 20);
            const kwMax = topKw.length > 0 ? topKw[0].count : 1;
            const kwBars = topKw.map(kw => `
                <div class="bar-row">
                    <div class="bar-label">${kw.keyword}</div>
                    <div class="bar-track"><div class="bar-fill pink" style="width:${(kw.count/kwMax*100).toFixed(1)}%"></div></div>
                    <div class="bar-count">${kw.count}</div>
                </div>`).join('');

            const agentIntentData = data.byAgentIntent || {};
            const allIntents = [...new Set(intentEntries.map(e => e[0]))];
            const agentIds = Object.keys(agentIntentData);
            let crossTableHtml = '';
            if (agentIds.length > 0) {
                const headerCells = allIntents.map(i => `<th style="font-size:0.6875rem;writing-mode:vertical-lr;padding:0.5rem 0.25rem;color:var(--text-tertiary)">${i}</th>`).join('');
                const bodyRows = agentIds.map(agentId => {
                    const cells = allIntents.map(intent => {
                        const val = (agentIntentData[agentId] || {})[intent] || 0;
                        const opacity = val > 0 ? Math.min(0.5, val/10) + 0.08 : 0;
                        const bg = val > 0 ? `rgba(37, 99, 235, ${opacity})` : 'transparent';
                        const color = val > 0 ? 'var(--text-primary)' : 'transparent';
                        return `<td class="heatmap-cell" style="background:${bg};color:${color}">${val || ''}</td>`;
                    }).join('');
                    return `<tr><td style="font-size:0.75rem;white-space:nowrap;color:var(--text-secondary)">${agentNames[agentId] || agentId}</td>${cells}</tr>`;
                }).join('');
                crossTableHtml = `
                    <div class="section" style="margin-top:1.5rem">
                        <div class="section-header"><div class="section-title">Agent × 意图 热力图</div></div>
                        <div class="section-body" style="overflow-x:auto">
                            <table class="data-table"><thead><tr><th>Agent</th>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>
                        </div>
                    </div>`;
            }

            document.getElementById('needsContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总采集需求</div>
                        <div class="stat-value">${data.totalEntries || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">需求类别数</div>
                        <div class="stat-value">${intentEntries.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">高频关键词数</div>
                        <div class="stat-value">${topKw.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最新更新</div>
                        <div class="stat-value" style="font-size:1rem">${(data.lastUpdated || '').replace('T',' ').slice(0,16) || '-'}</div>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="section">
                        <div class="section-header"><div class="section-title">用户需求分类排行</div></div>
                        <div class="section-body">
                            <div class="bar-chart">${intentBars || '<div class="empty-state">暂无数据</div>'}</div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header"><div class="section-title">高频关键词 TOP 20</div></div>
                        <div class="section-body">
                            <div class="bar-chart">${kwBars || '<div class="empty-state">暂无数据</div>'}</div>
                        </div>
                    </div>
                </div>
                ${crossTableHtml}`;
        }

        function toggleExportMenu() {
            document.getElementById('exportMenu').classList.toggle('show');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.export-dropdown')) {
                document.getElementById('exportMenu').classList.remove('show');
            }
        });

        function exportCorpus(format) {
            const agent = document.getElementById('filterAgent').value;
            const label = document.getElementById('filterLabel').value;
            const params = new URLSearchParams({ format, ...(agent && { agent }), ...(label && { label }) });
            window.location.href = `/api/admin/corpus/export?${params}`;
            document.getElementById('exportMenu').classList.remove('show');
        }

        function esc(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        loadOverview();
    </script>
</body>
</html>
