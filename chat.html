<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医美智能助手对话</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            color: white;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .agent-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .agent-info h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .agent-info p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .settings-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.25); }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: #1E3A8A; }
        .modal label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 0.3rem; margin-top: 0.8rem; }
        .modal select, .modal input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
        }
        .modal select:focus, .modal input:focus { border-color: #3B82F6; }
        .provider-group-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.3rem 0.5rem;
            pointer-events: none;
        }
        .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; justify-content: flex-end; }
        .btn-save {
            background: linear-gradient(135deg, #1E3A8A, #3B82F6);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .btn-cancel {
            background: #F1F5F9;
            color: #475569;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .provider-badge {
            font-size: 0.7rem;
            background: rgba(59,130,246,0.1);
            color: #3B82F6;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: #F8FAFC;
        }

        .message {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #059669 0%, #10B981 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .message-content h1 { font-size: 1.5rem; }
        .message-content h2 { font-size: 1.25rem; }
        .message-content h3 { font-size: 1.1rem; }

        .message-content ul,
        .message-content ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .message-content li {
            margin: 0.25rem 0;
        }

        .message-content p {
            margin: 0.5rem 0;
        }

        .message-content blockquote {
            border-left: 3px solid #3B82F6;
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: #64748B;
            font-style: italic;
        }

        .message-content code {
            background: #F1F5F9;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }

        .message-content pre {
            background: #F1F5F9;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content strong {
            font-weight: 600;
            color: #1E293B;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #E2E8F0;
            margin: 1rem 0;
        }

        .message.assistant .message-content {
            background: white;
            color: #1E293B;
            border: 1px solid #E2E8F0;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            color: white;
        }

        .message-time {
            font-size: 0.75rem;
            color: #94A3B8;
            margin-top: 0.5rem;
            text-align: right;
        }

        .message-feedback {
            display: flex;
            gap: 0.375rem;
            margin-top: 0.5rem;
        }

        .feedback-btn {
            padding: 0.25rem 0.5rem;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            color: #94A3B8;
            transition: all 0.15s;
        }

        .feedback-btn:hover { background: #F1F5F9; color: #475569; }
        .feedback-btn.active-up { background: rgba(16,185,129,0.1); border-color: #10B981; color: #10B981; }
        .feedback-btn.active-down { background: rgba(239,68,68,0.1); border-color: #EF4444; color: #EF4444; }

        .message.user .message-time {
            text-align: left;
            color: rgba(255,255,255,0.7);
        }

        .typing-indicator {
            display: none;
            padding: 1rem 1.25rem;
            background: white;
            border-radius: 16px;
            border: 1px solid #E2E8F0;
            width: fit-content;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94A3B8;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid #E2E8F0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #3B82F6;
        }

        .send-button {
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome-message {
            text-align: center;
            padding: 3rem 2rem;
            color: #64748B;
        }

        .welcome-message h3 {
            font-size: 1.5rem;
            color: #1E293B;
            margin-bottom: 0.5rem;
        }

        .welcome-message p {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .error-message {
            background: #FEE2E2;
            color: #991B1B;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="agent-avatar" id="agentAvatar">🤖</div>
            <div class="agent-info">
                <h2 id="agentName">加载中...</h2>
                <p id="agentDesc">正在初始化助手... <span class="provider-badge" id="providerBadge"></span></p>
            </div>
            <button class="settings-btn" onclick="openSettings()" title="配置 API Key">⚙️</button>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <h3>⚙️ AI 模型配置</h3>
                <p style="font-size:0.8rem;color:#64748B;margin-bottom:0.5rem">配置后优先使用您的 API Key，不填则使用服务器默认。</p>

                <label>选择服务商</label>
                <select id="providerSelect" onchange="onProviderChange()">
                    <option value="">— 使用服务器默认 —</option>
                    <optgroup label="🌍 国际">
                        <option value="openai">OpenAI (GPT)</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="gemini">Google Gemini</option>
                    </optgroup>
                    <optgroup label="🇨🇳 国内">
                        <option value="deepseek">DeepSeek</option>
                        <option value="siliconflow">硅基流动</option>
                        <option value="kimi">Kimi (月之暗面)</option>
                        <option value="qwen">通义千问</option>
                    </optgroup>
                </select>

                <label>API Key</label>
                <input type="password" id="apiKeyInput" placeholder="输入 API Key" autocomplete="off" />

                <label>模型</label>
                <select id="modelSelect"></select>

                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeSettings()">取消</button>
                    <button class="btn-save" onclick="saveSettings()">保存</button>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h3>👋 您好！</h3>
                <p>我是您的专属医美智能助手，请告诉我您的需求，我会为您提供专业的建议和方案。</p>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea
                    class="chat-input"
                    id="messageInput"
                    placeholder="输入您的问题..."
                    rows="1"
                    disabled
                ></textarea>
                <button class="send-button" id="sendButton" disabled>发送</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let sessionId = null;
        let agentId = null;
        let messageIndex = 0;

        // Provider models map (mirrors backend PROVIDERS_CONFIG)
        const PROVIDER_MODELS = {
            openai:      ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'],
            anthropic:   ['claude-opus-4-6', 'claude-sonnet-4-6', 'claude-haiku-4-5-20251001'],
            gemini:      ['gemini-2.0-flash-exp', 'gemini-1.5-pro', 'gemini-1.5-flash'],
            deepseek:    ['deepseek-chat', 'deepseek-reasoner'],
            siliconflow: ['deepseek-ai/DeepSeek-V3', 'Pro/deepseek-ai/DeepSeek-R1', 'Qwen/Qwen2.5-72B-Instruct'],
            kimi:        ['moonshot-v1-8k', 'moonshot-v1-32k', 'moonshot-v1-128k'],
            qwen:        ['qwen-max', 'qwen-plus', 'qwen-turbo'],
        };

        // Settings helpers
        function loadSettings() {
            try { return JSON.parse(localStorage.getItem('medagent_ai_config') || '{}'); } catch { return {}; }
        }
        function saveSettings() {
            const provider = document.getElementById('providerSelect').value;
            const apiKey   = document.getElementById('apiKeyInput').value.trim();
            const model    = document.getElementById('modelSelect').value;
            localStorage.setItem('medagent_ai_config', JSON.stringify({ provider, apiKey, model }));
            updateProviderBadge(provider);
            closeSettings();
        }
        function openSettings() {
            const s = loadSettings();
            document.getElementById('providerSelect').value = s.provider || '';
            document.getElementById('apiKeyInput').value    = s.apiKey   || '';
            onProviderChange();
            if (s.model) document.getElementById('modelSelect').value = s.model;
            document.getElementById('settingsModal').classList.add('open');
        }
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('open');
        }
        function onProviderChange() {
            const provider = document.getElementById('providerSelect').value;
            const models   = PROVIDER_MODELS[provider] || [];
            const sel      = document.getElementById('modelSelect');
            sel.innerHTML  = models.map(m => `<option value="${m}">${m}</option>`).join('');
            sel.disabled   = !models.length;
        }
        function updateProviderBadge(provider) {
            const names = { openai:'OpenAI', anthropic:'Claude', gemini:'Gemini', deepseek:'DeepSeek', siliconflow:'硅基流动', kimi:'Kimi', qwen:'通义千问' };
            const badge = document.getElementById('providerBadge');
            badge.textContent = provider ? names[provider] || provider : '';
        }

        // Get agent ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        agentId = urlParams.get('agent');


        const agentConfig = {
            'gtm-strategy': { avatar: '🎯', name: 'GTM战略大师', desc: '整合战略定位、循证背书、组品方案、价格控盘' },
            'product-expert': { avatar: '🧪', name: '产品材料专家', desc: '精通流变学、PACER模型、材料选择与机理拆解' },
            'academic-liaison': { avatar: '🎓', name: '学术推广专家', desc: '首席医学联络官，擅长KOL征服与学术叙事' },
            'marketing-director': { avatar: '✨', name: '市场创意总监', desc: '整合新媒体、视觉创意、种草运营、科学视觉' },
            'sales-director': { avatar: '⚔️', name: '销售作战总监', desc: '整合销售总监、大区经理、商务经理' },
            'operations-director': { avatar: '⚙️', name: '运营效能总监', desc: '整合SFE、财务、采购的综合运营' },
            'training-director': { avatar: '📚', name: '培训赋能总监', desc: 'ASK模型、反差教学、通关护照' },
            'aesthetic-design': { avatar: '💎', name: '高定美学设计总监', desc: '服务于Top 1%高净值人群的面部美学设计专家' },
            'senior-consultant': { avatar: '🥇', name: '金牌医美咨询师', desc: '10年一线经验的销冠级咨询师' },
            'sparring-robot': { avatar: '🥊', name: '医美实战陪练机器人', desc: 'HP动态情绪系统，高压仿真话术训练' },
            'post-op-guardian': { avatar: '🛡️', name: '医美术后私域管家', desc: '红绿灯风险分诊，将术后焦虑转化为复购信任' },
            'trend-setter': { avatar: '🔥', name: '医美爆款种草官', desc: '小红书算法与医美合规风控的内容炼金术师' },
            'anatomy-architect': { avatar: '🏗️', name: '医美解剖决策建筑师', desc: 'PACER模型，面部建筑结构分析，安全预警' },
            'materials-mentor': { avatar: '🧬', name: '医美材料学硬核导师', desc: '营销剥离，PACER深度拆解，灵魂拷问' },
            'visual-translator': { avatar: '🎨', name: '医美视觉通译官', desc: '机理转视觉画面，设计师Brief，3D渲染指导' },
            'area-manager': { avatar: '🗺️', name: '大区经理', desc: 'Forecast分级测谎、进销存逻辑闭环、情境模拟辅导' },
            'channel-manager': { avatar: '🤝', name: '商务经理', desc: 'ROI利润精算、反向背调、窜货雷霆管控、库存博弈' },
            'finance-bp': { avatar: '💰', name: '财务BP', desc: '税务合规与交易结构优化，货折替代票折保护利润' },
            'hrbp': { avatar: '🎯', name: '战略HRBP', desc: '精准猎聘竞品人才，背调侦查与竞业攻防' },
            'procurement-manager': { avatar: '📦', name: '采购经理', desc: 'Kraljic矩阵与Should-Cost模型优化TCO' }
        };

        // Initialize chat
        async function initChat() {
            if (!agentId || !agentConfig[agentId]) {
                showError('无效的助手ID');
                return;
            }

            const config = agentConfig[agentId];
            document.getElementById('agentAvatar').textContent = config.avatar;
            document.getElementById('agentName').textContent = config.name;
            document.getElementById('agentDesc').textContent = config.desc;

            try {
                const response = await fetch(`${API_BASE}/api/chat/init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agentId })
                });

                if (!response.ok) {
                    throw new Error('Failed to initialize chat');
                }

                const data = await response.json();
                sessionId = data.sessionId;

                // Enable input
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
                document.getElementById('messageInput').focus();

            } catch (error) {
                console.error('Init error:', error);
                showError('无法连接到服务器，请确保API服务器正在运行');
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !sessionId) return;

            // Add user message to UI
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            // Show typing indicator
            showTyping();

            // Disable input while processing
            input.disabled = true;
            document.getElementById('sendButton').disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/chat/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, message, ...loadSettings() })
                });

                if (!response.ok) {
                    throw new Error('Failed to send message');
                }

                const data = await response.json();

                // Hide typing indicator
                hideTyping();

                // Add assistant message
                addMessage('assistant', data.message);

            } catch (error) {
                console.error('Send error:', error);
                hideTyping();
                addMessage('assistant', '抱歉，我遇到了一些问题。请稍后再试。');
            } finally {
                // Re-enable input
                input.disabled = false;
                document.getElementById('sendButton').disabled = false;
                input.focus();
            }
        }

        // Add message to UI
        function addMessage(role, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const welcomeMsg = messagesContainer.querySelector('.welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : agentConfig[agentId].avatar;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Render Markdown for assistant messages
            if (role === 'assistant' && typeof marked !== 'undefined') {
                contentDiv.innerHTML = marked.parse(content);
            } else {
                contentDiv.textContent = content;
            }

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            if (role === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
                // Add feedback buttons for assistant messages
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'message-feedback';
                const idx = messageIndex++;
                feedbackDiv.innerHTML = `
                    <button class="feedback-btn" onclick="submitFeedback(this, ${idx}, 'up')">👍</button>
                    <button class="feedback-btn" onclick="submitFeedback(this, ${idx}, 'down')">👎</button>`;
                contentDiv.appendChild(feedbackDiv);
            }

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = agentConfig[agentId].avatar;

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator active';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Submit feedback
        async function submitFeedback(btn, idx, value) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('active-up', 'active-down'));
            btn.classList.add(value === 'up' ? 'active-up' : 'active-down');
            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, messageIndex: idx, feedback: value })
                });
            } catch {}
        }

        // Show error
        function showError(message) {
            const messagesContainer = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            messagesContainer.appendChild(errorDiv);
        }

        // Event listeners
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Initialize on load
        initChat();
        updateProviderBadge(loadSettings().provider || '');
        // Close modal on overlay click
        document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });
    </script>
</body>
</html>
