<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板 - MedAgent Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAF8F5;
            --bg-card: #FFFFFF;
            --bg-hover: #F2F0ED;
            --border: #E8E5E0;
            --text-primary: #191919;
            --text-secondary: #5C5C5C;
            --text-tertiary: #9B9B9B;
            --accent: #E8715A;
            --green: #2D7A4F;
            --blue: #2563EB;
            --red: #DC2626;
            --orange: #D97706;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(250,248,245,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-logo {
            width: 26px; height: 26px;
            background: var(--text-primary); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 0.75rem;
        }
        .topbar-breadcrumb { font-size: 0.8125rem; color: var(--text-tertiary); }
        .topbar-breadcrumb a { color: var(--text-secondary); text-decoration: none; }
        .topbar-breadcrumb a:hover { color: var(--text-primary); }
        .topbar-breadcrumb strong { color: var(--text-primary); }
        .topbar-actions { display: flex; gap: 0.5rem; }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 0.4375rem 0.875rem;
            border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.8125rem; font-weight: 500; font-family: inherit;
            transition: all 0.12s; display: inline-flex; align-items: center; gap: 0.375rem;
            text-decoration: none;
        }
        .btn-primary { background: var(--text-primary); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { opacity: 0.9; }
        .btn-sm { padding: 0.3125rem 0.625rem; font-size: 0.75rem; }

        /* ===== MAIN ===== */
        .main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        .page-header { margin-bottom: 2rem; }
        .page-title {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.75rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .page-subtitle { font-size: 0.875rem; color: var(--text-secondary); }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 1.25rem;
            transition: box-shadow 0.15s;
        }
        .stat-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .stat-label {
            font-size: 0.75rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .stat-sub { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.25rem; }

        /* ===== SECTION ===== */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px; margin-bottom: 1.5rem; overflow: hidden;
        }
        .section-header {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg);
        }
        .section-title { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
        .section-body { padding: 1.25rem; }

        /* ===== TWO COL ===== */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        /* ===== BAR CHART ===== */
        .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; }
        .bar-label {
            width: 150px; font-size: 0.8rem; color: var(--text-secondary);
            text-align: right; flex-shrink: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .bar-track {
            flex: 1; background: var(--bg); border-radius: 4px;
            height: 22px; overflow: hidden; border: 1px solid var(--border);
        }
        .bar-fill {
            height: 100%; border-radius: 4px; transition: width 0.5s ease;
        }
        .bar-fill.blue { background: #2563EB; }
        .bar-fill.green { background: #2D7A4F; }
        .bar-count {
            width: 36px; font-size: 0.8rem; color: var(--text-tertiary);
            text-align: right; flex-shrink: 0; font-weight: 500;
        }

        /* ===== FEEDBACK ===== */
        .feedback-row { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
        .feedback-item { display: flex; align-items: center; gap: 0.5rem; }
        .feedback-num { font-size: 1.5rem; font-weight: 700; }

        /* ===== CONVERSATION TABLE ===== */
        .conv-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .conv-table th {
            text-align: left; padding: 0.625rem 0.75rem;
            color: var(--text-tertiary); font-weight: 500; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.03em;
            border-bottom: 1px solid var(--border);
        }
        .conv-table td {
            padding: 0.625rem 0.75rem;
            border-bottom: 1px solid var(--bg);
            color: var(--text-secondary); vertical-align: top;
        }
        .conv-table tr:hover td { background: var(--bg); }
        .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tag {
            display: inline-block; padding: 0.125rem 0.5rem;
            border-radius: 100px; font-size: 0.7rem; font-weight: 600;
        }
        .tag-agent { background: rgba(37,99,235,0.08); color: #2563EB; }
        .tag-up { background: rgba(45,122,79,0.1); color: var(--green); }
        .tag-down { background: rgba(220,38,38,0.1); color: var(--red); }

        /* ===== INVITE CODE ===== */
        .code-form { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
        .code-input {
            flex: 1; padding: 0.5rem 0.875rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary);
            font-size: 0.875rem; outline: none; font-family: inherit;
            transition: border-color 0.15s;
        }
        .code-input:focus { border-color: var(--text-primary); }
        .code-input::placeholder { color: var(--text-tertiary); }
        .code-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .code-table th {
            text-align: left; padding: 0.5rem 0.75rem;
            color: var(--text-tertiary); border-bottom: 1px solid var(--border);
            font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .code-table td { padding: 0.625rem 0.75rem; border-bottom: 1px solid var(--bg); }
        .code-cell {
            font-family: 'SFMono-Regular', Consolas, monospace;
            color: #2563EB; background: rgba(37,99,235,0.06);
            padding: 0.25rem 0.5rem; border-radius: 4px;
            cursor: pointer; user-select: all; font-size: 0.8125rem;
        }
        .code-cell:hover { background: rgba(37,99,235,0.12); }
        .btn-copy {
            padding: 0.25rem 0.625rem; background: transparent;
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-tertiary); cursor: pointer; font-size: 0.75rem;
            font-family: inherit; transition: all 0.12s;
        }
        .btn-copy:hover { background: var(--bg-hover); color: var(--text-primary); }
        .btn-del {
            padding: 0.25rem 0.625rem; background: transparent;
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--red); cursor: pointer; font-size: 0.75rem;
            font-family: inherit; transition: all 0.12s;
        }
        .btn-del:hover { background: rgba(220,38,38,0.06); }
        .usage-bar { display: flex; align-items: center; gap: 0.5rem; }
        .usage-track {
            width: 60px; height: 6px;
            background: var(--bg); border-radius: 3px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .usage-fill { height: 100%; border-radius: 3px; background: #2563EB; }
        .usage-fill.full { background: var(--red); }
        .batch-row { display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center; }
        .batch-label { font-size: 0.8rem; color: var(--text-tertiary); white-space: nowrap; }

        .loading { text-align: center; padding: 3rem; color: var(--text-tertiary); font-size: 0.875rem; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-tertiary); font-size: 0.875rem; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">M</div>
            <span class="topbar-breadcrumb">
                <a href="index.html">MedAgent Hub</a> / <strong>数据看板</strong>
            </span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-secondary" onclick="loadData()">刷新</button>
            <button class="btn btn-primary" onclick="exportExcel()">导出 Excel</button>
            <a href="/corpus.html" class="btn btn-secondary">语料中心</a>
            <a href="/chat.html" class="btn btn-secondary">使用 Agent</a>
        </div>
    </header>

    <div class="main">
        <div class="page-header">
            <h1 class="page-title">数据看板</h1>
            <p class="page-subtitle">实时监控 Agent 使用情况、用户活跃度和对话质量</p>
        </div>

        <div id="content"><div class="loading">加载中...</div></div>

        <!-- 邀请码管理 -->
        <div class="section" style="margin-top:1.5rem">
            <div class="section-header">
                <div class="section-title">邀请码管理</div>
            </div>
            <div class="section-body">
                <div class="code-form">
                    <input class="code-input" id="newUserName" placeholder="输入客户姓名，如：李院长" maxlength="20">
                    <button class="btn btn-primary" onclick="createCode()">生成邀请码</button>
                </div>
                <div class="batch-row">
                    <span class="batch-label">批量生成：</span>
                    <input class="code-input" id="batchPrefix" placeholder="前缀，如：体验用户" maxlength="10" style="max-width:140px">
                    <input class="code-input" id="batchCount" type="number" placeholder="数量" min="1" max="50" value="5" style="max-width:80px">
                    <button class="btn btn-secondary" onclick="batchCreate()">批量生成</button>
                </div>
                <div id="codesTable" style="margin-top:1rem"><div class="loading">加载中...</div></div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/admin/stats');
                if (!res.ok) {
                    document.getElementById('content').innerHTML = '<div class="loading">无权限或服务器错误</div>';
                    return;
                }
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="loading">无法连接服务器</div>';
            }
        }

        function render(data) {
            const { agentCounts, userCounts, feedbackCounts, totalTurns, recentConvs } = data;
            const totalConvs = Object.values(agentCounts).reduce((a, b) => a + b, 0);
            const totalUsers = Object.keys(userCounts).length;
            const topAgent = Object.entries(agentCounts).sort((a,b) => b[1]-a[1])[0];
            const agentMax = Math.max(...Object.values(agentCounts), 1);
            const userMax = Math.max(...Object.values(userCounts), 1);

            const agentBars = Object.entries(agentCounts)
                .sort((a,b) => b[1]-a[1])
                .map(([agent, count]) => `
                    <div class="bar-row">
                        <div class="bar-label" title="${agent}">${agent}</div>
                        <div class="bar-track"><div class="bar-fill blue" style="width:${(count/agentMax*100).toFixed(1)}%"></div></div>
                        <div class="bar-count">${count}</div>
                    </div>`).join('');

            const userBars = Object.entries(userCounts)
                .sort((a,b) => b[1]-a[1])
                .map(([user, count]) => `
                    <div class="bar-row">
                        <div class="bar-label" title="${user}">${user}</div>
                        <div class="bar-track"><div class="bar-fill green" style="width:${(count/userMax*100).toFixed(1)}%"></div></div>
                        <div class="bar-count">${count}</div>
                    </div>`).join('');

            const convRows = recentConvs.slice().reverse().map(c => `
                <tr>
                    <td style="color:var(--text-tertiary);white-space:nowrap;font-size:0.75rem">${c.ts ? c.ts.replace('T',' ').slice(0,16) : '-'}</td>
                    <td><span class="tag tag-agent">${c.agent || '-'}</span></td>
                    <td style="color:var(--text-secondary)">${c.user_name || '-'}</td>
                    <td class="truncate">${escHtml(c.user || '')}</td>
                    <td class="truncate">${escHtml(c.assistant || '')}</td>
                </tr>`).join('');

            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总对话轮次</div>
                        <div class="stat-value">${totalConvs}</div>
                        <div class="stat-sub">含反馈共 ${totalTurns} 条</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">活跃用户数</div>
                        <div class="stat-value">${totalUsers}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最热 Agent</div>
                        <div class="stat-value" style="font-size:1.1rem;line-height:1.3">${topAgent ? topAgent[0] : '-'}</div>
                        <div class="stat-sub">${topAgent ? topAgent[1] + ' 次' : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">用户反馈</div>
                        <div class="feedback-row">
                            <div class="feedback-item"><span>👍</span><span class="feedback-num" style="color:var(--green)">${feedbackCounts.up || 0}</span></div>
                            <div class="feedback-item"><span>👎</span><span class="feedback-num" style="color:var(--red)">${feedbackCounts.down || 0}</span></div>
                        </div>
                    </div>
                </div>
                <div class="two-col">
                    <div class="section">
                        <div class="section-header"><div class="section-title">Agent 使用频率</div></div>
                        <div class="section-body">
                            <div class="bar-chart">${agentBars || '<div class="empty-state">暂无数据</div>'}</div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header"><div class="section-title">用户活跃度</div></div>
                        <div class="section-body">
                            <div class="bar-chart">${userBars || '<div class="empty-state">暂无数据</div>'}</div>
                        </div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header"><div class="section-title">最近对话记录（最新 50 条）</div></div>
                    <div class="section-body" style="overflow-x:auto">
                        <table class="conv-table">
                            <thead><tr><th>时间</th><th>Agent</th><th>用户</th><th>提问</th><th>回复</th></tr></thead>
                            <tbody>${convRows || '<tr><td colspan="5" class="empty-state">暂无对话记录</td></tr>'}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function exportData() { window.location.href = '/api/admin/export'; }
        function exportExcel() { window.location.href = '/api/admin/export-excel'; }

        async function loadCodes() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) return;
                const users = await res.json();
                renderCodes(users);
            } catch {}
        }

        function renderCodes(users) {
            if (!users.length) {
                document.getElementById('codesTable').innerHTML = '<div class="empty-state">暂无邀请码</div>';
                return;
            }
            const rows = users.map(u => {
                const pct = u.maxUses > 0 ? Math.min(100, Math.round(u.usage / u.maxUses * 100)) : 0;
                const full = u.remaining === 0;
                return `<tr>
                    <td style="color:var(--text-secondary)">${escHtml(u.name)}</td>
                    <td><span class="code-cell" title="点击复制">${u.code}</span></td>
                    <td><div class="usage-bar">
                        <div class="usage-track"><div class="usage-fill${full?' full':''}" style="width:${pct}%"></div></div>
                        <span style="font-size:0.75rem;color:${full?'var(--red)':'var(--text-tertiary)'}">${u.usage}/${u.maxUses}</span>
                    </div></td>
                    <td>
                        <button class="btn-copy" onclick="copyCode('${u.code}', this)">复制</button>
                        <button class="btn-del" onclick="deleteCode('${u.code}', '${escHtml(u.name)}')">删除</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('codesTable').innerHTML = `
                <table class="code-table">
                    <thead><tr><th>用户名</th><th>邀请码</th><th>使用次数</th><th>操作</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
        }

        async function createCode() {
            const nameInput = document.getElementById('newUserName');
            const name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            const res = await fetch('/api/admin/codes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            if (res.ok) { nameInput.value = ''; loadCodes(); }
        }

        async function deleteCode(code, name) {
            if (!confirm(`确认删除 ${name} 的邀请码？`)) return;
            await fetch(`/api/admin/codes/${encodeURIComponent(code)}`, { method: 'DELETE' });
            loadCodes();
        }

        function copyCode(code, btn) {
            navigator.clipboard.writeText(code).then(() => {
                const orig = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        async function batchCreate() {
            const prefix = document.getElementById('batchPrefix').value.trim() || '体验用户';
            const count = Math.min(50, Math.max(1, parseInt(document.getElementById('batchCount').value) || 5));
            const btn = event.target;
            btn.disabled = true; btn.textContent = '生成中...';
            for (let i = 1; i <= count; i++) {
                await fetch('/api/admin/codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: `${prefix}-${i}` })
                });
            }
            btn.disabled = false; btn.textContent = '批量生成';
            loadCodes();
        }

        loadData();
        loadCodes();
    </script>
</body>
</html>
